# Introduce the Hypatia collection and what readers will find here
intro: |
  Welcome to the Hypatia Collection—a curated library of stories, each inhabiting its own world, its own chronicles, and its own voice.

  The footnotes[^1] throughout these works are the work of the Librarian and his staff: meta-commentary from beyond the narrative, delivering dry observations, pedantic corrections, and the occasional (begrudging) nod of approval. The stories are intended to stand entirely on their own; the marginalia exists as an additional layer for those who enjoy such things.

  This site maintains no comment sections, no monetization, and no appetite for either. If anything here moves you to respond, the only currency accepted is your own writing. The author—one Michael Lockwood—is freely available as narrative raw material: villain, fool, hapless bystander, unreliable narrator, or whatever archetype suits your tale. Use him at your discretion to express your criticism or praise.  The purpose is to simply write.

  Browse the worlds below, or visit The Library to meet the Librarian and his staff.

  [^1]: *The author writes for fun. The Librarian has, after some internal struggle, made his peace with this state of affairs. What cannot be disputed is the sheer volume, the surprising range, and the occasional flashes of genuine craft scattered throughout—sufficient, at the very least, to justify the shelf space.  All rights are reserved. Money has never been the point and never will be. Inspiration borrowed in good faith is welcomed; inspiration that neglects to knock is not. The author further requests—and the Librarian emphatically concurs—that any creative incorporation of his person remain safely within the bounds of fiction. Narrative voodoo is tolerated; romantic speculation is beneath the dignity of this institution and, frankly, everyone involved.  Further biographical detail has been withheld at the author's express request. The Librarian finds this professionally frustrating and personally unsurprising. One does not curate what one cannot properly catalogue. — Dr. General Michael J. Fairfax-Lockwood Librarian Primus*