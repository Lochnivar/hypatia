---
layout: default
---

<article class="index-page">
  <header class="page-header">
    <h1>{{ site.title }}</h1>
  </header>
  <div class="library-intro page-content">
    {{ site.data.library.intro | markdownify }}
  </div>
  <nav class="world-list">
    <p><a href="{{ '/library/mjfl/' | relative_url }}">The Library</a> — Meet the Librarian and staff</p>
    <h2>Worlds</h2>
    <ul>
      {% assign worlds = site.pages | where: "layout", "world" | sort: "order" %}
      {% for world in worlds %}
      <li><a href="{{ world.url | relative_url }}">{{ world.title }}</a></li>
      {% endfor %}
    </ul>
  </nav>
</article>
