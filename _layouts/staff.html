---
layout: default
---

<article class="staff-page">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="subtitle">{{ page.subtitle }}</p>{% endif %}
    {% if page.role %}<p class="role">{{ page.role }}</p>{% endif %}
  </header>
  <div class="page-content">
    {{ content }}
  </div>
</article>
