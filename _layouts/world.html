---
layout: default
---

<article class="world-page">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
  </header>
  <div class="page-content">
    {{ content }}
  </div>
  <nav class="book-list">
    <h2>Books</h2>
    <ul>
      {% assign books = site.pages | where: "layout", "book" | where: "world", page.world | sort: "order" %}
      {% for book in books %}
      <li><a href="{{ book.url | relative_url }}">{{ book.title }}</a></li>
      {% endfor %}
    </ul>
  </nav>
</article>
